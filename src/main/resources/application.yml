spring:
  application:
    name: chat-app
  profiles:
    active: dev
  datasource:
    driver-class-name: ${spring.datasource.driver-class-name}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}
  data:
    redis:
      host: ${spring.data.redis.host}
      port: ${spring.data.redis.port}
      database: ${spring.data.redis.database}
      connect-timeout: ${spring.data.redis.connect-timeout}
      timeout: ${spring.data.redis.timeout}
  alioss:
    endpoint: ${spring.alioss.endpoint}
    access-key-id: ${spring.alioss.access-key-id}
    access-key-secret: ${spring.alioss.access-key-secret}
    bucket-name: ${spring.alioss.bucket-name}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: qwen3.5-plus
      log-requests: true
      log-responses: true
      timeout: PT120S
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: text-embedding-v4
      log-requests: true
      log-responses: true

# 记忆写入器专用模型（轻量快速，与主聊天模型隔离）
memory-writer:
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: ${API-KEY}
  model-name: qwen-turbo
  timeout: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
    tags:
      application: ${spring.application.name}

rag:
  postgres:
    host: localhost
    port: 5432
    database: atrl_chat
    user: postgres
    password: 123456
    table: conversation_memories
    dimension: 1024

logging:
  level:
    dev.langchain4j: debug

server:
  port: 8085

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

chatapp:
  jwt:
    admin-secret-key: ${chatapp.jwt.admin-secret-key}
    admin-ttl: ${chatapp.jwt.admin-ttl}
    admin-token-name: ${chatapp.jwt.admin-token-name}
    user-secret-key: ${chatapp.jwt.user-secret-key}
    user-ttl: ${chatapp.jwt.user-ttl}
    user-token-name: ${chatapp.jwt.user-token-name}
  netty:
    websocket:
      enabled: true
      host: 0.0.0.0
      port: 8090
      path: /ws/group
      max-content-length: 65536